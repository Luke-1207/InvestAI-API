server:
  servlet:
    context-path: /investai-api

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/investai_db}
    username: ${SPRING_DATASOURCE_USERNAME:investaidb_dev}
    password: ${SPRING_DATASOURCE_PASSWORD:investaidb_dev123!@#}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  rabbitmq:
    host: ${SPRING_RABBITMQ_HOST:localhost}
    username: ${SPRING_RABBITMQ_USERNAME:guest}
    password: ${SPRING_RABBITMQ_PASSWORD:guest}
  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=500,expireAfterWrite=15m

jwt:
  secret: ${JWT_SECRET:investai-local-dev-secret-super-segura-256bits}
  expiration-ms: 900000

